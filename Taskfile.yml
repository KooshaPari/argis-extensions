version: '3'

vars:
  LANGUAGE:
    sh: |
      if [ -f go.work ] || [ -f go.mod ]; then
        echo go
      elif [ -f pyproject.toml ]; then
        echo python
      elif [ -f package.json ]; then
        echo node
      else
        echo unknown
      fi
  GO_MODULE_DIRS:
    sh: |
      find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort | tr '\n' ' '

tasks:
  default:
    desc: Run the build task
    cmds:
      - task: build

  build:
    desc: Build the detected project language
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            for module in {{.GO_MODULE_DIRS}}; do
              echo "Building ${module}"
              (cd "${module}" && go build ./...)
            done
            ;;
          python)
            python -m build
            ;;
          node)
            npm run build
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  test:
    desc: Run tests for the detected project language
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            for module in {{.GO_MODULE_DIRS}}; do
              echo "Testing ${module}"
              (cd "${module}" && go test ./...)
            done
            ;;
          python)
            pytest
            ;;
          node)
            npm test
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  lint:
    desc: Run lint checks for the detected project language
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            for module in {{.GO_MODULE_DIRS}}; do
              echo "Linting ${module}"
              if command -v golangci-lint >/dev/null 2>&1; then
                (cd "${module}" && golangci-lint run --timeout 5m ./...)
              else
                (cd "${module}" && go vet ./...)
              fi
            done
            ;;
          python)
            ruff check .
            ;;
          node)
            npm run lint
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  clean:
    desc: Clean build and test artifacts
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            for module in {{.GO_MODULE_DIRS}}; do
              echo "Cleaning ${module}"
              (cd "${module}" && go clean -testcache -fuzzcache)
            done
            ;;
          python)
            rm -rf build/ dist/ .pytest_cache/ .ruff_cache/ .mypy_cache/
            find . -type d -name __pycache__ -prune -exec rm -rf {} +
            rm -f .coverage coverage.xml
            ;;
          node)
            rm -rf dist/ build/ coverage/ node_modules/.cache/ .next/
            ;;
          *)
            rm -rf bin/ dist/ build/ coverage/ .pytest_cache/ .ruff_cache/ .mypy_cache/
            rm -f coverage.out coverage.html .coverage coverage.xml
            ;;
        esac
