version: "3"

vars:
  BUILD_ARTIFACTS: bin coverage.out coverage.html
  GO_PACKAGES: ./...
  GOLANGCI_LINT_ARGS: run --timeout 5m ./...
  GO_MODULES:
    sh: find . -name go.mod -not -path "./.git/*" -exec dirname {} \; | sort | tr "\n" " "

tasks:
  default:
    desc: Build all detected Go modules
    cmds:
      - task: build

  detect:
    desc: Print detected project language and module roots
    cmds:
      - |
        set -e
        if [ -n "{{.GO_MODULES}}" ]; then
          echo "language: go"
          echo "modules: {{.GO_MODULES}}"
        else
          echo "language: unknown"
        fi

  build:
    desc: Build all detected Go modules
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Building ${module}"
          (cd "${module}" && go build {{.GO_PACKAGES}})
        done

  test:
    desc: Run tests for all detected Go modules
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Testing ${module}"
          (cd "${module}" && go test {{.GO_PACKAGES}})
        done

  lint:
    desc: Run lint checks for all detected Go modules
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Linting ${module}"
          if command -v golangci-lint >/dev/null 2>&1; then
            (cd "${module}" && golangci-lint {{.GOLANGCI_LINT_ARGS}})
          else
            (cd "${module}" && go vet {{.GO_PACKAGES}})
          fi
        done

  clean:
    desc: Clean local Go build artifacts and test caches
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Cleaning ${module}"
          (cd "${module}" && go clean -testcache -fuzzcache)
        done
        rm -rf {{.BUILD_ARTIFACTS}}
