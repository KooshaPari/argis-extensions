version: '3'

default: build

vars:
  LANGUAGE:
    sh: |
      if [ -f go.mod ]; then
        echo go
      elif [ -f pyproject.toml ]; then
        echo python
      elif [ -f package.json ]; then
        echo node
      else
        echo unknown
      fi

tasks:
  build:
    desc: "Build the detected project"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            find . -name go.mod -not -path "*/vendor/*" -not -path "*/.git/*" -exec dirname {} \; \
              | sort \
              | while IFS= read -r module; do
                  echo "==> go build ${module}"
                  (cd "${module}" && go build -v ./...)
                done
            ;;
          python)
            python -m build
            ;;
          node)
            npm run build
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  test:
    desc: "Run the detected test suite"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            find . -name go.mod -not -path "*/vendor/*" -not -path "*/.git/*" -exec dirname {} \; \
              | sort \
              | while IFS= read -r module; do
                  echo "==> go test ${module}"
                  (cd "${module}" && go test -v ./...)
                done
            ;;
          python)
            pytest
            ;;
          node)
            npm test
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  lint:
    desc: "Run the detected linter"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            find . -name go.mod -not -path "*/vendor/*" -not -path "*/.git/*" -exec dirname {} \; \
              | sort \
              | while IFS= read -r module; do
                  echo "==> go lint ${module}"
                  if command -v golangci-lint >/dev/null 2>&1; then
                    (cd "${module}" && golangci-lint run --timeout 10m ./...)
                  else
                    (cd "${module}" && go vet ./...)
                  fi
                done
            ;;
          python)
            ruff check .
            ;;
          node)
            npm run lint
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  clean:
    desc: "Clean build artifacts"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            find . -name go.mod -not -path "*/vendor/*" -not -path "*/.git/*" -exec dirname {} \; \
              | sort \
              | while IFS= read -r module; do
                  echo "==> go clean ${module}"
                  (cd "${module}" && go clean -cache -testcache)
                done
            rm -rf bin/ coverage.out coverage.html
            ;;
          python)
            rm -rf build/ dist/ .pytest_cache/ .ruff_cache/ .mypy_cache/ __pycache__/
            rm -f .coverage coverage.xml
            ;;
          node)
            rm -rf dist/ build/ coverage/ node_modules/.cache/ .next/
            ;;
          *)
            rm -rf bin/ dist/ build/ .pytest_cache/ .ruff_cache/ .mypy_cache/
            rm -f coverage.out coverage.html .coverage coverage.xml
            ;;
        esac

  test-cover:
    desc: "Run tests with coverage"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  format:
    desc: "Format code"
    cmds:
      - go fmt ./...

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...

  deps:
    desc: "Download and verify dependencies"
    cmds:
      - go mod download
      - go mod verify

  security:
    desc: "Run security audit"
    cmds:
      - go run golang.org/x/vulncheck/cmd/govulncheck@latest ./...

  ci:
    desc: "Run full CI pipeline"
    cmds:
      - task: format
      - task: vet
      - task: lint
      - task: test

  cli-build:
    desc: "Build CLI binary"
    cmds:
      - go build -o bin/bifrost ./cmd/bifrost

  cli-install:
    desc: "Install CLI globally"
    cmds:
      - go install ./cmd/bifrost
