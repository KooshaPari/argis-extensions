version: "3"

vars:
  GO_MODULES:
    sh: find . -name go.mod -not -path "./.git/*" -exec dirname {} \; | sort | tr "\n" " "

tasks:
  default:
    desc: Build all Go modules
    cmds:
      - task: build

  detect:
    desc: Print detected project language
    cmds:
      - echo "go"

  build:
    desc: Build all Go modules
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Building ${module}"
          (cd "${module}" && go build ./...)
        done

  test:
    desc: Run Go tests
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Testing ${module}"
          (cd "${module}" && go test ./...)
        done

  lint:
    desc: Run Go lint checks
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Linting ${module}"
          if command -v golangci-lint >/dev/null 2>&1; then
            (cd "${module}" && golangci-lint run --timeout 5m ./...)
          else
            (cd "${module}" && go vet ./...)
          fi
        done

  clean:
    desc: Clean Go build and test caches
    cmds:
      - |
        set -e
        for module in {{.GO_MODULES}}; do
          echo "Cleaning ${module}"
          (cd "${module}" && go clean -cache -testcache -fuzzcache)
        done
