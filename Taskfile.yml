version: '3'

tasks:
  build:
    desc: "Build the Go project"
    cmds:
      - go build -v ./...

  test:
    desc: "Run all tests"
    cmds:
      - go test -v -race ./...

  test-cover:
    desc: "Run tests with coverage"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: "Run linter"
    cmds:
      - golangci-lint run ./...

  format:
    desc: "Format code"
    cmds:
      - go fmt ./...

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html

  deps:
    desc: "Download and verify dependencies"
    cmds:
      - go mod download
      - go mod verify

  security:
    desc: "Run security audit"
    cmds:
      - go run golang.org/x/vulncheck/cmd/govulncheck@latest ./...

  ci:
    desc: "Run full CI pipeline"
    cmds:
      - task: format
      - task: vet
      - task: lint
      - task: test

  # CLI specific targets
  cli-build:
    desc: "Build CLI binary"
    cmds:
      - go build -o bin/bifrost ./cmd/bifrost

  cli-install:
    desc: "Install CLI globally"
    cmds:
      - go install ./cmd/bifrost
