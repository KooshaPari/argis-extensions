version: '3'

default: build

vars:
  LANGUAGE:
    sh: |
      if [ -f go.mod ]; then
        echo go
      elif [ -f pyproject.toml ]; then
        echo python
      elif [ -f package.json ]; then
        echo node
      else
        echo unknown
      fi

tasks:
  build:
    desc: "Build the detected project"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            go build -v ./...
            ;;
          python)
            python -m build
            ;;
          node)
            npm run build
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  test:
    desc: "Run the detected test suite"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            go test -v ./...
            ;;
          python)
            pytest
            ;;
          node)
            npm test
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  lint:
    desc: "Run the detected linter"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            golangci-lint run --timeout 10m ./...
            ;;
          python)
            ruff check .
            ;;
          node)
            npm run lint
            ;;
          *)
            echo "Unable to detect a supported project language"
            exit 1
            ;;
        esac

  clean:
    desc: "Clean build artifacts"
    cmds:
      - |
        set -e
        case "{{.LANGUAGE}}" in
          go)
            rm -rf bin/ coverage.out coverage.html
            go clean -cache -testcache
            ;;
          python)
            rm -rf build/ dist/ .pytest_cache/ .ruff_cache/ .mypy_cache/ __pycache__/
            rm -f .coverage coverage.xml
            ;;
          node)
            rm -rf dist/ build/ coverage/ node_modules/.cache/ .next/
            ;;
          *)
            rm -rf bin/ dist/ build/ .pytest_cache/ .ruff_cache/ .mypy_cache/
            rm -f coverage.out coverage.html .coverage coverage.xml
            ;;
        esac

  test-cover:
    desc: "Run tests with coverage"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  format:
    desc: "Format code"
    cmds:
      - go fmt ./...

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...

  deps:
    desc: "Download and verify dependencies"
    cmds:
      - go mod download
      - go mod verify

  security:
    desc: "Run security audit"
    cmds:
      - go run golang.org/x/vulncheck/cmd/govulncheck@latest ./...

  ci:
    desc: "Run full CI pipeline"
    cmds:
      - task: format
      - task: vet
      - task: lint
      - task: test

  cli-build:
    desc: "Build CLI binary"
    cmds:
      - go build -o bin/bifrost ./cmd/bifrost

  cli-install:
    desc: "Install CLI globally"
    cmds:
      - go install ./cmd/bifrost
